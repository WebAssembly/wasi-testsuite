vendor = false
precise_srcs = true
include_top_level = true
third_party_dir = "third-party/rust"

[platform.linux-x86_64]
target = "x86_64-unknown-linux-gnu"
execution-platform = true

[platform.linux-arm64]
target = "aarch64-unknown-linux-gnu"
execution-platform = true

[platform.macos]
target = "x86_64-apple-darwin"
execution-platform = true

[platform.macos-arm64]
target = "aarch64-apple-darwin"
execution-platform = true

[platform.windows-msvc]
target = "x86_64-pc-windows-msvc"
execution-platform = true

[platform.wasi]
target = "wasm32-wasip1"
execution-platform = false

[buck]
rust_library = "cargo.rust_library"
rust_binary = "cargo.rust_binary"
buildscript_genrule = "buildscript_run"

generated_file_header = """
# @generated by `reindeer buckify`
"""

buckfile_imports = """
load("@prelude//rust:cargo_buildscript.bzl", "buildscript_run")
load("@prelude//rust:cargo_package.bzl", "cargo")
"""
