name: Daily runtime validation

on:
  schedule:
    - cron: 0 0 * * *

permissions: {}

jobs:
  wasmtime:
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: install just
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: just
      - name: install dotslash
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: dotslash

      - name: Install Rust WASI targets
        run: rustup target add wasm32-wasip1 wasm32-wasip2

      - name: Run all tests
        env:
          MSYS_NO_PATHCONV: "1"
          MSYS2_ARG_CONV_EXCL: "*"
        run: just test

  other-runtimes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: install just
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: just
      - name: install dotslash
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: dotslash

      - name: Install Rust WASI targets
        run: rustup target add wasm32-wasip1 wasm32-wasip2

      - name: Run extra Buck runtime tests
        run: just test-extra-runtimes
