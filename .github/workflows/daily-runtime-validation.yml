name: Daily runtime validation

on:
  schedule:
    - cron: 0 0 * * *

permissions: {}

jobs:
  wasmtime:
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Buck2 helper tools
        uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285 # v2.79.13
        with:
          tool: dotslash,just

      - name: Install Rust WASI targets
        run: rustup target add wasm32-wasip1 wasm32-wasip2

      - name: Configure Buck2 launcher on Windows
        if: runner.os == 'Windows'
        run: |
          echo 'BUCK2=dotslash ./buck2' >> "$GITHUB_ENV"
          echo 'MSYS2_ARG_CONV_EXCL=//' >> "$GITHUB_ENV"

      - name: Run all tests
        run: just test

  other-runtimes:
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Buck2 helper tools
        uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285 # v2.79.13
        with:
          tool: dotslash,just

      - name: Install Rust WASI targets
        run: rustup target add wasm32-wasip1 wasm32-wasip2

      - name: Configure Buck2 launcher on Windows
        if: runner.os == 'Windows'
        run: |
          echo 'BUCK2=dotslash ./buck2' >> "$GITHUB_ENV"
          echo 'MSYS2_ARG_CONV_EXCL=//' >> "$GITHUB_ENV"

      - name: Run extra Buck runtime tests
        if: runner.os == 'Linux'
        run: just test-extra-runtimes
