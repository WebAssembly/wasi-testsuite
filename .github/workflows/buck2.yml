name: Buck2

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  buck2:
    name: Buck2 tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install just
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: just

      - name: Install DotSlash
        uses: facebook/install-dotslash@5f505c7478ed90c86b492133b43dca875a3c885a

      - name: Install Rust WASI targets
        run: rustup target add wasm32-wasip1 wasm32-wasip2

      - name: Configure Buck2 launcher on Windows
        if: runner.os == 'Windows'
        run: |
          echo 'BUCK2=dotslash ./buck2' >> "$GITHUB_ENV"
          echo 'MSYS2_ARG_CONV_EXCL=//' >> "$GITHUB_ENV"

      - name: Run Starlark lint
        run: just lint-starlark

      - name: Run Wasmtime Buck tests
        run: just test

      - name: Run JCO Buck tests
        run: just test-jco

      - name: Run extra Buck runtime tests
        if: runner.os == 'Linux'
        run: just test-extra-runtimes

      - name: Build dist archive
        run: just dist
